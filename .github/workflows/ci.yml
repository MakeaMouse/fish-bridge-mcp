name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Tier 1: Unit + integration tests
  # -----------------------------------------------------------------------
  test:
    name: Unit tests — Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q --tb=short --no-header

  # -----------------------------------------------------------------------
  # Tier 2: Fixture-based scenario tests (no API keys)
  # -----------------------------------------------------------------------
  scenarios:
    name: Scenario tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run scenario tests
        run: pytest tests/e2e/ -v --tb=short

  # -----------------------------------------------------------------------
  # Tier 3: Install smoke — uv tool install from wheel (ubuntu + macos)
  # -----------------------------------------------------------------------
  install-smoke:
    name: Install smoke — ${{ matrix.os }} / uv tool install
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build wheel
        run: uv build --wheel

      - name: uv tool install wheel
        run: uv tool install dist/*.whl

      - name: Run smoke tests
        shell: bash
        run: |
          # uv tool installs to $(uv tool dir --bin); add it AND the standard fallback to PATH
          export PATH="$(uv tool dir --bin):$HOME/.local/bin:$PATH"
          echo "Tool bin dir: $(uv tool dir --bin)"
          echo "fish-bridge at: $(which fish-bridge || echo NOT_FOUND)"

          fish-bridge --help

          fish-bridge config --show

          TMP=$(mktemp -d)
          fish-bridge init --project "$TMP" --tool copilot
          ls "$TMP"

          # Set local backend — no API key required in CI
          fish-bridge config --backend local

          TMP2=$(mktemp -d)
          fish-bridge ingest \
            --source file \
            --file tests/fixtures/claude-export.json \
            --project "$TMP2" \
            --no-compile

          TMP3=$(mktemp -d)
          CHAT="$TMP3/Library/Application Support/Code/User/workspaceStorage/abc123/GitHub.copilot-chat"
          mkdir -p "$CHAT"
          cp tests/fixtures/sample-copilot-session.jsonl "$CHAT/sample-copilot-session.jsonl"
          fish-bridge ingest --source copilot --workspace "$TMP3" --project "$TMP3" --no-compile 2>&1 || true

          # MCP handshake
          printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}\n' \
            | timeout 5 fish-bridge-mcp 2>/dev/null | head -1 > /tmp/mcp_resp.txt || true
          echo "MCP response: $(cat /tmp/mcp_resp.txt)"
          python3 - <<'EOF'
          import json, sys
          data = open('/tmp/mcp_resp.txt').read().strip()
          if not data:
              print("WARNING: Empty MCP response — server did not reply in time")
              sys.exit(0)
          d = json.loads(data)
          assert 'result' in d, f'Bad MCP response: {d}'
          print('MCP handshake OK')
          EOF

  # -----------------------------------------------------------------------
  # Tier 4: pip install smoke (secondary install path)
  # -----------------------------------------------------------------------
  pip-install-smoke:
    name: pip install smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build and pip install into fresh venv
        run: |
          pip install build
          python -m build --wheel
          python -m venv /tmp/pip-test-env
          /tmp/pip-test-env/bin/pip install dist/*.whl

      - name: Smoke — fish-bridge --help
        run: /tmp/pip-test-env/bin/fish-bridge --help

      - name: Smoke — fish-bridge config --show
        run: /tmp/pip-test-env/bin/fish-bridge config --show

  # -----------------------------------------------------------------------
  # Lint
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting and linting
        run: ruff check fish_bridge/ tests/
